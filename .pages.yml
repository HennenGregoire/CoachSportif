media:
  input: assets
  output: /assets

content:
  - name: site
    label: Textes de la page d'accueil
    type: file
    path: content/site.json
    fields:
      - { name: nom_site, label: Nom du site, type: string }
      - { name: sous_titre, label: Sous-titre, type: string }
      - { name: professeur, label: Nom, type: string }
      - { name: accroche, label: Texte d'accueil, type: text }
      - { name: bouton_principal, label: Texte du bouton principal, type: string }
      - { name: intro_exercices, label: Introduction de la page exercices, type: text }
      - { name: message_prof, label: Message descriptif, type: text }
      - { name: analyse_eyebrow, label: Petit titre de la méthode, type: string }
      - { name: analyse_titre, label: Grand titre de la méthode, type: string }
      - name: analyse_etapes
        label: Étapes de la méthode d'analyse vidéo
        type: object
        list: true
        fields:
          - { name: numero, label: Numéro, type: string }
          - { name: titre, label: Titre de l'étape, type: string }
          - { name: texte, label: Texte de l'étape, type: text }
      - { name: email, label: Email de contact, type: string }

  - name: categories
    label: Catégories sportives
    type: file
    path: content/categories.json
    list: true
    fields:
      - { name: nom, label: Nom, type: string }
      - { name: slug, label: Identifiant sans accent, type: string, description: "Exemple : musculation, natation, course" }
      - { name: description, label: Description, type: text }
      - { name: icone, label: Icône emoji, type: string }

  - name: exercices
    label: Exercices et analyses vidéo
    type: file
    path: content/exercices.json
    list: true
    fields:
      - { name: titre, label: Titre de l'exercice, type: string }
      - name: categorie
        label: Catégorie
        type: select
        options:
          values: [musculation, natation, course]
      - { name: niveau, label: Niveau, type: string }
      - { name: objectif, label: Objectif pédagogique, type: text }
      - { name: video_correcte, label: Lien YouTube vidéo, type: string }
      - { name: image, label: Image optionnelle, type: image, required: false }
      - name: points_cles
        label: Points clés
        type: string
        list: true
      - name: erreurs_frequentes
        label: Erreurs fréquentes
        type: string
        list: true
      - name: corrections
        label: Corrections proposées
        type: string
        list: true
      - { name: consigne_prof, label: aide suplementaire, type: text }

  - name: ressources
    label: Documents et ressources
    type: file
    path: content/ressources.json
    list: true
    fields:
      - { name: titre, label: Titre, type: string }
      - { name: type, label: Type, type: string, description: "PDF, grille, lien, consigne, etc." }
      - { name: description, label: Description, type: text }
      - { name: lien, label: Lien externe, type: string, required: false }
      - { name: fichier, label: Fichier PDF ou document, type: file, required: false }
