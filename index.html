<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse du mouvement</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <a class="brand" href="#accueil">Analyse du mouvement</a>
  <nav>
    <a href="#exercices">Exercices</a>
    <a href="#analyse">Méthode</a>
    <a href="#ressources">Ressources</a>
  </nav>
</header>

<main>
  <section id="accueil" class="hero">
    <div class="hero-text">
      <p class="eyebrow" id="professeur"></p>
      <h1 id="nom-site">Analyse du mouvement</h1>
      <p id="accroche"></p>
      <a class="button" href="#exercices" id="bouton-principal">Voir les exercices</a>
    </div>
    <div class="hero-card">
      <span>🎥</span>
      <h2>Observer → Comprendre → Corriger</h2>
      <p id="message-prof"></p>
    </div>
  </section>

  <section id="exercices" class="section">
    <div class="section-head">
      <p class="eyebrow">Bibliothèque pédagogique</p>
      <h2>Exercices par catégorie</h2>
      <p id="intro-exercices"></p>
    </div>
    <div id="category-filters" class="filters"></div>
    <div id="exercise-grid" class="exercise-grid"></div>
  </section>

  <section id="analyse" class="section muted">
  <div class="section-head">
    <p class="eyebrow" id="analyse-eyebrow">Analyse vidéo</p>
    <h2 id="analyse-titre">Comment utiliser une fiche exercice</h2>
  </div>

  <div class="steps" id="analyse-steps"></div>
</section>

  <section id="ressources" class="section">
    <div class="section-head">
      <p class="eyebrow">Supports</p>
      <h2>Documents et ressources</h2>
    </div>
    <div id="resources-list" class="resources"></div>
  </section>
</main>

<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-box">
    <button class="close" id="close-modal">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<footer>
  <p id="footer-contact"></p>
</footer>

<script src="script.js"></script>
</body>
</html>
